# Keep the runner authentication token in a Secret rather than inline. The
# token MUST live under the "token" key.
apiVersion: v1
data:
  # base64 of a "glrt-..." authentication token
  token: Z2xydC1leGFtcGxlLXRva2Vu
kind: Secret
metadata:
  name: gitlab-runner-token
type: Opaque
---
apiVersion: gitlab.k8s.alekc.dev/v1beta2
kind: Runner
metadata:
  name: runner-sample
spec:
  authentication:
    authentication_token_secret: gitlab-runner-token
