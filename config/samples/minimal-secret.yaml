# Keep the runner authentication token in a Secret rather than inline. The key
# defaults to "token"; set secret_key_ref.key to read a different key.
apiVersion: v1
data:
  # base64 of a "glrt-..." authentication token
  token: Z2xydC1leGFtcGxlLXRva2Vu
kind: Secret
metadata:
  name: gitlab-runner-token
type: Opaque
---
apiVersion: gitlab.k8s.alekc.dev/v1beta2
kind: Runner
metadata:
  name: runner-sample
spec:
  authentication:
    token:
      secret_key_ref:
        name: gitlab-runner-token
        # key omitted -> defaults to "token"; set it to read another key.
