version: "2"

run:
  timeout: 5m

linters:
  # the standard set: errcheck, govet, ineffassign, staticcheck, unused
  default: standard
  enable:
    - misspell
    - unconvert
  settings:
    staticcheck:
      # all staticcheck checks except QF1008 (a stylistic "drop the embedded
      # field from the selector" quickfix, not a correctness issue).
      checks:
        - all
        - -QF1008
