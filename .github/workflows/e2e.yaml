name: e2e

# The e2e suite stands up a kind cluster and talks to a real GitLab, so it does
# not run on every push. A maintainer launches it by commenting "/launch e2e" on
# a pull request, or via manual workflow_dispatch.
on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag, or SHA) to test"
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.event.issue.number || github.ref }}
  cancel-in-progress: true

# No workflow-wide token. The e2e job runs checked-out PR code with GitLab
# secrets, so write scope is granted only to the authorize job below.
permissions: {}

jobs:
  authorize:
    # Run only on manual dispatch, or when a repo collaborator (OWNER / MEMBER /
    # COLLABORATOR) comments exactly "/launch e2e" on a pull request. This gates
    # the secret-using e2e to maintainers and is the approval step for fork PRs.
    permissions:
      pull-requests: read
      issues: write # to react to the launch comment
    if: >-
      github.event_name == 'workflow_dispatch' ||
      ( github.event.issue.pull_request != null &&
        github.event.comment.body == '/launch e2e' &&
        contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) )
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve ref to test
        id: resolve
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('ref', context.payload.inputs.ref || context.ref);
              return;
            }
            // Acknowledge the command, then test the PR's head commit.
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.data.head.sha);

  # Latest patch of each recent Kubernetes minor that has a kindest/node image.
  k8s_versions:
    needs: authorize
    runs-on: ubuntu-latest
    steps:
      - uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6
      - id: matrix
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          k8s_cycles="$(curl -sSfL https://endoflife.date/api/kubernetes.json | jq -rc '[sort_by(.releaseDate) | reverse | .[0:4] | .[].cycle]')"
          kind_versions="$(crane ls docker.io/kindest/node | jq -sRrc --argjson cycles "${k8s_cycles}" 'split("\n") | [.[] | match("^v((\\d+\\.\\d+)\\.\\d+)$").captures | {cycle: .[1].string, version: .[0].string}] | group_by(.cycle) | [.[] | .[-1] | {(.cycle): {"version": .version}}] | reduce .[] as $item ({}; . *= $item) | . as $versions | [$cycles | .[] | select($versions[.] != null) | $versions[.].version]')"
          echo "k8s_versions=${kind_versions}" >> "${GITHUB_OUTPUT}"
          # Pin the kind binary to its latest release so `kind load` understands
          # the newest node images the matrix selects. The node tags above come
          # from the latest kind release, and an older kind binary fails to load
          # into them with "unknown containerd config version: 4".
          kind_version="$(curl -sSfL -H "Authorization: Bearer ${GH_TOKEN}" https://api.github.com/repos/kubernetes-sigs/kind/releases/latest | jq -r .tag_name)"
          echo "kind_version=${kind_version}" >> "${GITHUB_OUTPUT}"
    outputs:
      k8s_versions: ${{ steps.matrix.outputs.k8s_versions }}
      kind_version: ${{ steps.matrix.outputs.kind_version }}

  e2e:
    needs: [authorize, k8s_versions]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        k8s_version: ${{ fromJson(needs.k8s_versions.outputs.k8s_versions) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.authorize.outputs.ref }}
          # PR code runs here with secrets; do not leave GITHUB_TOKEN in git config.
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.x

      - name: Create kind cluster (k8s ${{ matrix.k8s_version }})
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: ${{ needs.k8s_versions.outputs.kind_version }}
          cluster_name: kind
          node_image: kindest/node:v${{ matrix.k8s_version }}
          wait: 2m

      - name: Install cert-manager
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.yaml
          kubectl -n cert-manager rollout status deploy/cert-manager --timeout=300s
          kubectl -n cert-manager rollout status deploy/cert-manager-webhook --timeout=300s
          kubectl -n cert-manager rollout status deploy/cert-manager-cainjector --timeout=300s

      - name: Build operator image
        run: docker build -f Dockerfile.e2e -t gitlab-runner-operator:e2e .

      - name: Load image into kind
        run: kind load docker-image gitlab-runner-operator:e2e --name kind

      - name: Deploy operator (CRDs, RBAC, webhook, cert-manager cert)
        run: |
          make deploy IMG=gitlab-runner-operator:e2e
          kubectl -n gitlab-runner-operator-system rollout status \
            deploy/gitlab-runner-operator-controller-manager --timeout=300s

      - name: Run e2e suite
        env:
          GITLAB_E2E_URL: ${{ secrets.GITLAB_E2E_URL }}
          GITLAB_E2E_TOKEN: ${{ secrets.GITLAB_E2E_TOKEN }}
          GITLAB_E2E_PROJECT_ID: ${{ secrets.GITLAB_E2E_PROJECT_ID }}
        run: make test-e2e
