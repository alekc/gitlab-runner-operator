name: pr

on: pull_request

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit + envtest)
        run: make test
