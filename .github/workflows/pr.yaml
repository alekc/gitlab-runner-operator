name: pr

on: pull_request

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.x
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (unit + envtest)
        run: make test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.x
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          # Gate only issues introduced by the PR, so the pre-existing backlog
          # does not block adoption.
          only-new-issues: true

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.x
      - name: govulncheck
        # Required gate. Runs govulncheck in binary mode (see the Makefile
        # target) because source mode panics on go 1.26. setup-go installs the
        # latest 1.26 patch, so standard-library CVEs fixed in a released patch
        # are already resolved; a failure here means a reachable CVE in our code
        # or dependencies that we must address.
        run: make govulncheck
