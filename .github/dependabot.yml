version: 2
updates:
  # Go module dependencies. Addresses the standing dependency CVE alerts and
  # keeps the SDKs (controller-runtime, gitlab-org/api, k8s.io/*) current.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch the noisy k8s.io / sigs.k8s.io bumps into one PR.
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"

  # Keep the SHA-pinned GitHub Actions current (Dependabot updates pinned SHAs
  # and the version comment together).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
